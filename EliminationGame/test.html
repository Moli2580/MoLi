<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>俄罗斯方块</title>
  <style>
    /* 基础/经典主题变量 */
    :root { 
      --bg: #1a1a2e; --panel: #16213e; --panel2: #0f3460; --accent: #e94560; --grid: #2a3b5c; --text: #fff; 
      --canvas-bg: var(--panel); --canvas-border: var(--panel2); --canvas-shadow: 0 0 15px rgba(0, 0, 0, 0.5);
      --info-color: var(--accent); --info-shadow: 0 0 5px rgba(233, 69, 96, 0.5);
      --menu-bg: rgba(0,0,0,0.85); --menu-wrap-bg: transparent; --menu-wrap-border: none; --menu-wrap-shadow: none; --menu-backdrop: none;
      --btn-bg: var(--accent); --btn-border: none; --btn-shadow: 0 4px 6px rgba(0,0,0,0.3);
      --title-shadow: 0 0 10px rgba(233, 69, 96, 0.5); --title-color: var(--accent);
      --hint-bg: rgba(15, 52, 96, 0.35); --hint-border: rgba(15, 52, 96, 0.9);
      --list-hover: rgba(255,255,255,0.1); --list-active: rgba(233, 69, 96, 0.3); --list-border: rgba(255,255,255,0.1);
    }
    
    /* 霓虹赛博朋克主题变量 */
    body[data-theme="neon"] {
      --bg: #0a0a10; --panel: rgba(15, 30, 50, 0.6); --panel2: rgba(25, 45, 75, 0.8); --neon: #00F0FF;
      --canvas-bg: rgba(10, 15, 25, 0.7); --canvas-border: rgba(0, 240, 255, 0.25); --canvas-shadow: 0 0 25px rgba(0, 0, 0, 0.8), inset 0 0 20px rgba(0, 240, 255, 0.15);
      --info-color: var(--neon); --info-shadow: 0 0 8px rgba(0, 240, 255, 0.6);
      --menu-bg: rgba(5, 5, 10, 0.85); --menu-wrap-bg: rgba(10, 20, 35, 0.85); --menu-wrap-border: 1px solid rgba(0, 240, 255, 0.3); --menu-wrap-shadow: 0 15px 40px rgba(0,0,0,0.9), inset 0 0 25px rgba(0, 240, 255, 0.1); --menu-backdrop: blur(12px);
      --btn-bg: linear-gradient(135deg, var(--accent), #b22c45); --btn-border: 1px solid rgba(255,255,255,0.3); --btn-shadow: 0 6px 12px rgba(0,0,0,0.4);
      --title-shadow: 0 0 10px var(--neon), 0 0 20px var(--neon); --title-color: #fff;
      --hint-bg: var(--panel); --hint-border: rgba(0,240,255,0.15);
      --list-hover: rgba(0,240,255,0.15); --list-active: rgba(0,240,255,0.25); --list-border: rgba(0,240,255,0.2);
    }

    body { margin: 0; padding: 0; background: var(--bg); color: var(--text); font-family: 'Segoe UI', Tahoma, sans-serif; touch-action: none; overflow: hidden; display: flex; flex-direction: column; height: 100vh; width: 100vw; transition: background 0.3s;}
    body[data-theme="neon"] { background: radial-gradient(circle at 50% 30%, #1f2235 0%, var(--bg) 100%); }
    body[data-theme="neon"]::after { content: ""; position: absolute; inset: 0; background: repeating-linear-gradient(0deg, rgba(0,0,0,0.15) 0px, rgba(0,0,0,0.15) 1px, transparent 1px, transparent 2px); pointer-events: none; z-index: 999; opacity: 0.6; }

    #game-area { flex: 1; display: flex; justify-content: center; align-items: center; padding: 10px; box-sizing: border-box; gap: 15px; position: relative; z-index: 1; }
    canvas { background: var(--canvas-bg); backdrop-filter: blur(8px); border: 2px solid var(--canvas-border); border-radius: 4px; box-shadow: var(--canvas-shadow); }
    @keyframes dropShake { 0%, 100% { transform: translateY(0); } 25% { transform: translateY(8px); } 50% { transform: translateY(-4px); } 75% { transform: translateY(2px); } }
    .shake { animation: dropShake 0.15s ease-out; }
    
    #ui-panel { display: flex; flex-direction: column; gap: 12px; width: 80px; }
    .info-box { background: var(--panel); backdrop-filter: blur(5px); padding: 8px 4px; border-radius: 8px; text-align: center; font-size: 13px; font-weight: bold; box-shadow: inset 0 0 10px rgba(0,0,0,0.5); }
    body[data-theme="neon"] .info-box { border: 1px solid rgba(255,255,255,0.1); box-shadow: 0 4px 10px rgba(0,0,0,0.5), inset 0 0 10px rgba(0,240,255,0.05); }
    .info-box span { display: block; font-size: 16px; color: var(--info-color); margin-top: 4px; text-shadow: var(--info-shadow); word-break: break-all; transition: 0.3s; }
    #next-canvas { width: 100%; border-radius: 4px; }
    
    .action-btn { background: var(--btn-bg); color: white; border: var(--btn-border); border-radius: 8px; padding: 10px 5px; font-size: 14px; font-weight: bold; box-shadow: var(--btn-shadow); cursor: pointer; margin-top: 5px; transition: transform 0.1s, filter 0.2s; }
    .action-btn:active { transform: translateY(2px); box-shadow: 0 2px 3px rgba(0,0,0,0.3); }
    .action-btn:hover { filter: brightness(1.2); }
    
    #controls { height: 180px; display: grid; grid-template-columns: 1fr 1fr 1fr 1fr; grid-template-rows: 1fr 1fr; gap: 10px; padding: 15px; background: var(--panel); backdrop-filter: blur(10px); border-top: 2px solid var(--panel2); padding-bottom: max(15px, env(safe-area-inset-bottom)); z-index: 2;}
    body[data-theme="neon"] #controls { border-top: 1px solid rgba(0,240,255,0.2); }
    .btn { background: var(--panel2); border: none; border-radius: 12px; color: var(--text); font-size: 24px; font-weight: bold; display: flex; justify-content: center; align-items: center; user-select: none; -webkit-tap-highlight-color: transparent; box-shadow: 0 4px 6px rgba(0,0,0,0.3); transition: transform 0.1s, background 0.1s; cursor: pointer; }
    body[data-theme="neon"] .btn { border: 1px solid rgba(255,255,255,0.1); }
    .btn:active, .btn.active { background: var(--btn-bg); transform: translateY(2px); box-shadow: 0 2px 3px rgba(0,0,0,0.5); }
    #btn-left { grid-column: 1; grid-row: 1 / span 2; } #btn-right { grid-column: 4; grid-row: 1 / span 2; } #btn-rotate { grid-column: 2 / span 2; grid-row: 1; }
    #btn-down { grid-column: 2; grid-row: 2; font-size: 20px;} #btn-hard { grid-column: 3; grid-row: 2; font-size: 20px;}
    
    .overlay { position: absolute; inset: 0; background: var(--menu-bg); backdrop-filter: blur(4px); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 10; transition: 0.3s; }
    .menu-wrapper { position: relative; width: 280px; height: 380px; background: var(--menu-wrap-bg); backdrop-filter: var(--menu-backdrop); border: var(--menu-wrap-border); border-radius: 16px; box-shadow: var(--menu-wrap-shadow); transition: 0.3s;}
    #overlay-pause .menu-wrapper { height: 440px; }
    #overlay-settings .menu-wrapper { height: 490px; }
    .menu-header { position: absolute; top: 0; left: 0; width: 100%; height: 100px; display: flex; flex-direction: column; justify-content: center; align-items: center; }
    .menu-header h1 { color: var(--title-color); margin: 0; font-size: 32px; text-shadow: var(--title-shadow); text-align: center; }
    .menu-high-score-text { color: #ccc; font-size: 16px; margin: 10px 0 0 0; font-weight: bold; }
    .menu-high-score-text span { color: var(--accent); font-size: 20px; text-shadow: 0 0 8px rgba(233, 69, 96, 0.8); }
    
    .menu-buttons { position: absolute; bottom: 0; left: 0; width: 100%; display: flex; flex-direction: column; align-items: center; gap: 16px; padding-bottom: 25px; }
    .overlay button { padding: 15px 20px; font-size: 18px; background: var(--btn-bg); color: white; border: var(--btn-border); border-radius: 8px; font-weight: bold; margin: 0; width: 180px; box-sizing: border-box; cursor: pointer; box-shadow: var(--btn-shadow); transition: transform 0.1s, filter 0.2s; }
    .overlay button:active { transform: translateY(2px); }
    .overlay button:hover { filter: brightness(1.2); }
    .overlay button.secondary { background: var(--panel2); }
    body[data-theme="neon"] .overlay button.secondary { background: linear-gradient(135deg, #1a2a42, var(--panel2)); border-color: rgba(0, 240, 255, 0.2); }
    
    .setting-item { width: 220px; background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.05); border-radius: 8px; padding: 15px 20px; box-sizing: border-box; display: flex; flex-direction: column; gap: 10px; box-shadow: inset 0 0 10px rgba(0,0,0,0.5); }
    body[data-theme="classic"] .setting-item { background: var(--panel2); box-shadow: 0 4px 6px rgba(0,0,0,0.4); border: none; }
    .setting-header { display: flex; justify-content: space-between; align-items: center; font-size: 16px; font-weight: bold; color: #ddd; }
    
    input[type=range] { -webkit-appearance: none; width: 100%; background: transparent; margin: 5px 0;}
    input[type=range]:focus { outline: none; }
    input[type=range]::-webkit-slider-runnable-track { width: 100%; height: 6px; cursor: pointer; background: #0b0e17; border-radius: 3px; border: 1px solid rgba(255,255,255,0.1); }
    body[data-theme="classic"] input[type=range]::-webkit-slider-runnable-track { background: var(--grid); border: none; }
    input[type=range]::-webkit-slider-thumb { height: 18px; width: 18px; border-radius: 50%; background: var(--accent); cursor: pointer; -webkit-appearance: none; margin-top: -7px; box-shadow: 0 0 10px rgba(0,0,0,0.5); }
    body[data-theme="neon"] input[type=range]::-webkit-slider-thumb { background: var(--neon); box-shadow: 0 0 10px var(--neon); }
    
    .toggle-row { display: flex; justify-content: space-between; align-items: center; font-size: 16px; font-weight: bold; color: #ddd; }
    .toggle-row span.status { color: #fff; background: var(--accent); padding: 2px 10px; border-radius: 4px; cursor: pointer; user-select: none; box-shadow: 0 0 8px rgba(233, 69, 96, 0.6); transition: 0.3s; }
    body[data-theme="classic"] .toggle-row span.status { background: rgba(0,0,0,0.3); color: var(--accent); box-shadow: none; }
    .toggle-row.off span.status { background: #333; color: #888; box-shadow: none; }
    
    .score-display { text-align: center; background: rgba(0, 0, 0, 0.4); padding: 20px 0; border-radius: 12px; border: 1px solid rgba(255,255,255,0.05); box-shadow: inset 0 0 15px rgba(0,0,0,0.5); width: 85%; margin: 0 auto; box-sizing: border-box; }
    body[data-theme="classic"] .score-display { background: rgba(15, 52, 96, 0.6); border: 1px solid var(--panel2); box-shadow: inset 0 0 15px rgba(0,0,0,0.3); }
    .score-display p { margin: 0; font-size: 22px; font-weight: bold; color: #ccc;}
    .score-display .final-score { color: var(--info-color); font-size: 32px; text-shadow: var(--info-shadow); }
    
    @keyframes pulse { from { transform: scale(1); box-shadow: 0 0 5px #ffd700; } to { transform: scale(1.1); box-shadow: 0 0 20px #ffd700; } }
    #new-record-badge { display: none; background: linear-gradient(135deg, #ffd700, #ff8c00); color: #000; padding: 2px 8px; border-radius: 6px; font-size: 14px; margin-left: 10px; vertical-align: middle; animation: pulse 0.8s infinite alternate; border: 1px solid #fff; }
    
    #pc-hints { display: none; width: 220px; background: var(--hint-bg); border: 1px solid var(--hint-border); border-radius: 12px; padding: 14px; box-shadow: 0 8px 20px rgba(0,0,0,0.5), inset 0 0 15px rgba(0,240,255,0.05); backdrop-filter: blur(8px); transition: 0.3s;}
    body[data-theme="classic"] #pc-hints { box-shadow: inset 0 0 10px rgba(0,0,0,0.35); backdrop-filter: blur(6px); }
    #pc-hints h3{ margin: 0 0 10px 0; font-size: 16px; color: var(--title-color); text-align: center; text-shadow: 0 0 5px rgba(0,240,255,0.5); }
    body[data-theme="classic"] #pc-hints h3 { color: #fff; text-shadow: none; }
    .hint-row{ display: flex; justify-content: space-between; align-items: center; padding: 6px 0; border-bottom: 1px dashed rgba(255,255,255,0.1); font-size: 14px; color: #ccc; }
    .hint-row:last-child{ border-bottom: none; }
    .keycap{ display: inline-flex; align-items: center; justify-content: center; min-width: 44px; padding: 4px 8px; border-radius: 6px; background: linear-gradient(180deg, #2a3550, #16213e); border: 1px solid #4a5b82; border-bottom: 3px solid #0f1626; box-shadow: 0 4px 6px rgba(0,0,0,0.4); font-weight: 800; letter-spacing: 0.5px; color: #fff; }
    body[data-theme="classic"] .keycap { background: rgba(22,33,62,0.9); border: 1px solid rgba(255,255,255,0.12); border-bottom: none; box-shadow: 0 3px 6px rgba(0,0,0,0.25); }
    .keycap.space{ min-width: 78px; }

    /* --- 音乐播放器专属样式 --- */
    
    /* 入口按钮：严格正圆，尺寸缩小到40px */
    .icon-btn-corner { position: absolute; bottom: 20px; left: 20px; background: var(--panel2); border: 1px solid var(--list-border); border-radius: 50%; width: 40px; height: 40px; font-size: 18px; display: flex; justify-content: center; align-items: center; cursor: pointer; box-shadow: 0 4px 10px rgba(0,0,0,0.5); transition: 0.2s; z-index: 20;}
    body[data-theme="neon"] .icon-btn-corner { background: rgba(10, 20, 35, 0.8); backdrop-filter: blur(5px); box-shadow: 0 0 15px rgba(0,240,255,0.2); }
    .icon-btn-corner:hover { transform: scale(1.1); }
    .icon-btn-corner:active { transform: scale(0.95); }

    /* 播放界面：扩大面板尺寸 */
    #overlay-music .menu-wrapper { height: 580px; width: 340px; }
    .music-content { position: absolute; top: 80px; left: 0; width: 100%; padding: 0 25px; box-sizing: border-box; display: flex; flex-direction: column; gap: 15px; }
    .now-playing { font-size: 18px; font-weight: bold; color: var(--info-color); text-align: center; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; text-shadow: var(--info-shadow); background: rgba(0,0,0,0.3); padding: 10px; border-radius: 8px; border: 1px solid var(--list-border); }
    
    .music-controls { display: flex; justify-content: space-between; align-items: center; padding: 0 10px; }
    /* 控制按钮缩小 */
    .ctrl-btn { background: none; border: none; color: #fff; font-size: 18px; cursor: pointer; transition: 0.2s; text-shadow: 0 2px 4px rgba(0,0,0,0.5); }
    .ctrl-btn:hover { transform: scale(1.1); color: var(--info-color); }
    .ctrl-btn:active { transform: scale(0.9); }
    .play-pause { font-size: 26px; color: var(--accent); }
    body[data-theme="neon"] .play-pause { color: var(--neon); text-shadow: 0 0 10px var(--neon); }

    .vol-row { display: flex; align-items: center; gap: 10px; font-size: 16px; background: rgba(0,0,0,0.2); padding: 5px 15px; border-radius: 20px; }
    
    /* 歌曲列表展示高度拉长 */
    .playlist { flex: 1; height: 230px; overflow-y: auto; background: rgba(0,0,0,0.3); border: 1px solid var(--list-border); border-radius: 8px; padding: 5px; }
    .playlist::-webkit-scrollbar { width: 6px; }
    .playlist::-webkit-scrollbar-track { background: transparent; }
    .playlist::-webkit-scrollbar-thumb { background: var(--grid); border-radius: 3px; }
    body[data-theme="neon"] .playlist::-webkit-scrollbar-thumb { background: rgba(0,240,255,0.3); }
    
    .playlist-item { padding: 10px; font-size: 14px; color: #ccc; cursor: pointer; border-radius: 6px; transition: 0.2s; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 2px; }
    .playlist-item:hover { background: var(--list-hover); color: #fff; }
    .playlist-item.active { background: var(--list-active); color: #fff; font-weight: bold; border-left: 4px solid var(--info-color); }
    
    @media (hover: hover) and (pointer: fine) and (min-width: 900px) {
      #controls{ display: none; } #pc-hints{ display: block; } #game-area{ gap: 22px; padding: 22px; }
      #ui-panel{ width: 110px; gap: 15px; } .info-box{ font-size: 15px; padding: 10px 5px;} .info-box span{ font-size: 20px; }
    }
  </style>
</head>
<body data-theme="classic">
  <div id="game-area">
    <div id="pc-hints" aria-hidden="true">
      <h3>操作指南</h3>
      <div class="hint-row"><span class="keycap">A</span><span>向左平移</span></div>
      <div class="hint-row"><span class="keycap">D</span><span>向右平移</span></div>
      <div class="hint-row"><span class="keycap">W</span><span>顺时旋转</span></div>
      <div class="hint-row"><span class="keycap">S</span><span>加速下落</span></div>
      <div class="hint-row"><span class="keycap space">Space</span><span>瞬间坠落</span></div>
      <div class="hint-row"><span class="keycap">P</span><span>暂停/继续</span></div>
    </div>
    <canvas id="board"></canvas>
    <div id="ui-panel">
      <canvas id="next-canvas"></canvas>
      <div class="info-box">最高分 <span id="ui-high-score">0</span></div>
      <div class="info-box">当前分 <span id="score">0</span></div>
      <div class="info-box">等级 <span id="level">1</span></div>
      <div class="info-box">行数 <span id="lines">0</span></div>
      <button class="action-btn" id="pause-btn">⏸ 暂停</button>
    </div>
    
    <div id="overlay-start" class="overlay">
      <button id="music-menu-btn" class="icon-btn-corner" title="音乐播放器">🎵</button>
      <div class="menu-wrapper">
        <div class="menu-header"><h1>俄罗斯方块</h1><p class="menu-high-score-text">最高纪录: <span id="menu-high-score">0</span></p></div>
        <div class="menu-buttons">
          <button id="start-normal-btn" class="secondary">普通模式</button>
          <button id="start-easy-btn" class="secondary">休闲模式</button>
          <button id="settings-btn" class="secondary">游 戏 设 置</button>
        </div>
      </div>
    </div>
    
    <!-- 音乐播放器界面 -->
    <div id="overlay-music" class="overlay" style="display: none;">
      <div class="menu-wrapper">
        <div class="menu-header"><h1>音乐电台</h1></div>
        <div class="music-content">
          <div class="now-playing" id="music-title">准备播放...</div>
          <div class="music-controls">
            <button id="music-mode-btn" class="ctrl-btn" title="播放模式">🔁</button>
            <button id="music-prev-btn" class="ctrl-btn" title="上一首">⏮</button>
            <button id="music-play-btn" class="ctrl-btn play-pause" title="播放/暂停">▶️</button>
            <button id="music-next-btn" class="ctrl-btn" title="下一首">⏭</button>
          </div>
          <div class="vol-row">
            <span>🔉</span>
            <input type="range" id="music-vol-slider" min="0" max="100" value="100">
          </div>
          <div class="playlist" id="playlist-container">
            <!-- 列表动态生成 -->
          </div>
        </div>
        <div class="menu-buttons" style="padding-bottom: 15px;">
          <button id="music-btn-back">返 回</button> 
        </div>
      </div>
    </div>

    <div id="overlay-settings" class="overlay" style="display: none;">
      <div class="menu-wrapper">
        <div class="menu-header"><h1>设置</h1></div>
        <div class="menu-buttons">
          <div class="setting-item">
            <div class="setting-header"><span>背景音乐</span><span id="bgm-val">100%</span></div>
            <input type="range" id="bgm-slider" min="0" max="100" value="100">
          </div>
          <div class="setting-item">
            <div class="setting-header"><span>游戏音效</span><span id="sfx-val">100%</span></div>
            <input type="range" id="sfx-slider" min="0" max="100" value="100">
          </div>
          <div class="setting-item">
            <div class="toggle-row" id="toggle-grid-row"><span>显示网格</span><span class="status" id="grid-status">开</span></div>
          </div>
          <div class="setting-item">
            <div class="toggle-row" id="toggle-theme-row"><span>主题风格</span><span class="status" id="theme-status">经典</span></div>
          </div>
          <button id="menu-btn-settings">返 回</button> 
        </div>
      </div>
    </div>
    
    <div id="overlay-pause" class="overlay" style="display: none;">
      <div class="menu-wrapper">
        <div class="menu-header"><h1>游戏已暂停</h1></div>
        <div class="menu-buttons">
          <button id="resume-btn" class="secondary">继 续 游 戏</button>
          <button id="restart-btn" class="secondary">重 新 开 始</button>
          <button id="pause-settings-btn" class="secondary">游 戏 设 置</button> 
          <button id="menu-btn-pause">返 回 菜 单</button>
        </div>
      </div>
    </div>
    <div id="overlay-gameover" class="overlay" style="display: none;">
      <div class="menu-wrapper" style="height: 400px;">
        <div class="menu-header" style="height: 100px;"><h1>局局结束</h1></div>
        <div class="score-display" style="position: absolute; top: 120px;">
          <p class="final-score">得分: <span id="final-score-val">0</span><span id="new-record-badge">新纪录!</span></p>
        </div>
        <div class="menu-buttons">
          <button id="retry-btn" class="secondary">再 战 一 局</button>
          <button id="menu-btn-gameover">返 回 菜 单</button>
        </div>
      </div>
    </div>
  </div>
  <div id="controls">
    <div class="btn" id="btn-left">◀</div>
    <div class="btn" id="btn-rotate">↻ 旋转</div>
    <div class="btn" id="btn-down">▼ 下落</div>
    <div class="btn" id="btn-hard">⏬ 坠落</div>
    <div class="btn" id="btn-right">▶</div>
  </div>

  <script>
    const $ = id => document.getElementById(id);
    const canvas = $('board'), ctx = canvas.getContext('2d'), nextCanvas = $('next-canvas'), nextCtx = nextCanvas.getContext('2d');
    const COLS = 10, ROWS = 20;
    let BLOCK_SIZE = 20;

    const COLORS_CLASSIC = [null, '#00E5FF', '#2962FF', '#FF6D00', '#FFD600', '#00E676', '#D500F9', '#FF1744'];
    const COLORS_NEON = [null, '#00FFFF', '#0055FF', '#FF8800', '#FFFF00', '#00FF00', '#FF00FF', '#FF0055'];

      if ($('overlay-start').style.display !== 'none') return ['Space', 'Enter'].includes(e.code) && (e.preventDefault(), startGame('normal'));
      if ($('overlay-settings').style.display !== 'none' || $('overlay-music').style.display !== 'none' || gameOver) return;
      if (isPaused) return ['p', 'P', 'Escape', 'Enter'].includes(e.key) && (e.preventDefault(), $('resume-btn').click());
      if (isClearing) return;
      initAudio(); const k = e.key.toLowerCase(); if (e.code === 'Space' || k === 'p') e.preventDefault();
      if (k === 'a' || e.key === 'ArrowLeft') playerMove(-1); else if (k === 'd' || e.key === 'ArrowRight') playerMove(1); else if (k === 'w' || e.key === 'ArrowUp') playerRotate(); else if (k === 's' || e.key === 'ArrowDown') playerDrop(true); else if (e.code === 'Space') playerHardDrop(); else if (k === 'p') togglePause();
    });

    $('menu-high-score').innerText = $('ui-high-score').innerText = currentHighScore = parseInt(localStorage.getItem('tetrisHighScore') || '0', 10);
    initPlaylistDOM();
    playTrack(currentBgmIndex, false); 
    applySettings(); board = createMatrix(COLS, ROWS); resize(); draw();
  </script>
</body>
